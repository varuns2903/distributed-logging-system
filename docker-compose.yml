version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.1
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  fluentd:
    build:
      context: .
      dockerfile: Dockerfile.fluentd
    ports:
      - "9880:9880"
    volumes:
      - ./fluentd.conf:/fluentd/etc/fluentd.conf
    environment:
      FLUENTD_CONF: fluentd.conf
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  order-service:
    build: .
    command: python order_service/order_service.py
    environment:
      FLUENTD_HOST: fluentd
      FLUENTD_PORT: 9880
    depends_on:
      - fluentd
    restart: on-failure

  payment-service:
    build: .
    command: python payment_service/payment_service.py
    environment:
      FLUENTD_HOST: fluentd
      FLUENTD_PORT: 9880
    depends_on:
      - fluentd
    restart: on-failure

  inventory-service:
    build: .
    command: python inventory_service/inventory_service.py
    environment:
      FLUENTD_HOST: fluentd
      FLUENTD_PORT: 9880
    depends_on:
      - fluentd
    restart: on-failure

  shipping-service:
    build: .
    command: python shipping_service/shipping_service.py
    environment:
      FLUENTD_HOST: fluentd
      FLUENTD_PORT: 9880
    depends_on:
      - fluentd
    restart: on-failure

  pubsub:
    build: .
    command: python app.py
    working_dir: /app/PUB-SUB
    ports:
      - "5000:5000"
    environment:
      KAFKA_BROKERS: kafka:9092
      ES_HOST: http://elasticsearch:9200
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: on-failure
