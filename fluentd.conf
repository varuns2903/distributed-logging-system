<source>
  @type forward
  port 9880
  bind 0.0.0.0
</source>


<match fluentd.**.logs>
  @type kafka2
  brokers "#{ENV['KAFKA_BROKERS'] || 'localhost:9092'}"
  default_topic logs

  <format>
    @type json
  </format>

  <buffer>
    @type file
    path /var/log/fluentd/kafka_logs_buffer
    chunk_limit_size 2M
    total_limit_size 8M
    flush_interval 1s
    retry_max_times 10
    retry_type exponential_backoff
    retry_wait 1s
  </buffer>
</match>

<match fluentd.**.heartbeat>
  @type kafka2
  brokers "#{ENV['KAFKA_BROKERS'] || 'localhost:9092'}"
  default_topic heartbeat

  <format>
    @type json
  </format>

  <buffer>
    @type file
    path /var/log/fluentd/kafka_heartbeat_buffer
    chunk_limit_size 2M
    total_limit_size 8M
    flush_interval 3s
    retry_max_times 10
    retry_type exponential_backoff
    retry_wait 1s
  </buffer>
</match>
